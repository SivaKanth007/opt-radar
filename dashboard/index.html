<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPT Radar</title>
<link rel="stylesheet" href="theme.css?v=__BUILD__">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
  <h1>OPT Radar</h1>
  <div id="meta"></div>
  <button id="refresh-btn">Refresh data</button>
  <div id="stale-banner" class="banner hidden"></div>
</header>

<main>
  <!-- Hero: pulse stats + global percentile ruler (module builds its own h2) -->
  <section id="headline"></section>

  <!-- Live: "N approved since last update" + throughput + personal hope panel -->
  <section id="live"></section>

  <!-- Personal projection -->
  <section id="calculator">
    <h2>My timeline</h2>
    <form id="calc-form"></form>
    <div id="calc-out"></div>
  </section>

  <!-- Cases near yours -->
  <section id="similar">
    <h2>Similar cases</h2>
    <div id="similar-out"></div>
  </section>

  <!-- Current trends (module builds canvases under its h2) -->
  <section id="trends"><h2>Trends</h2></section>

  <!-- Full paginated approvals list (module builds its own h2) -->
  <section id="approvals"></section>

  <!-- Heat-map calendars -->
  <section id="calendars">
    <h2>Calendars</h2>
    <h3>Cohort completion — % of each day's applicants approved so far</h3>
    <div id="cal-cohort" class="cal"></div>
    <h3>Approval volume — approvals per day</h3>
    <div id="cal-volume" class="cal"></div>
  </section>

  <!-- Stage / RFE / center / weekday breakdowns -->
  <section id="funnel"><h2>Stage funnel</h2></section>
  <section id="rfe"><h2>RFE / NOID</h2></section>
  <section id="centers"><h2>Service centers</h2></section>
  <section id="weekday"><h2>Approvals by weekday</h2></section>

  <!-- Meta -->
  <section id="diff"><h2>New since previous snapshot</h2><div id="diff-out"></div></section>
  <section id="quality"><h2>Data quality</h2><div id="quality-out"></div></section>
</main>

<script type="module" src="app.js?v=__BUILD__"></script>
</body>
</html>
