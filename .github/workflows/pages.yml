name: Fetch data and deploy dashboard

on:
  schedule:
    - cron: '0 * * * *'   # hourly (GitHub cron is best-effort; runs may lag 5-20 min)
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Seed "previous" data from the live site so the diff panel shows
      # what changed since the last deploy instead of "first snapshot".
      - name: Seed previous data from live site
        run: |
          mkdir -p data
          curl -sf "https://${{ github.repository_owner }}.github.io/opt-radar/data/latest.json" -o data/latest.json || true

      - name: Fetch fresh data
        run: node fetch-data.mjs
        # If sources are down this fails -> deploy is skipped -> previous page stays live.

      - name: Assemble site
        run: |
          mkdir -p site/data
          cp -r dashboard site/dashboard
          cp -r lib site/lib
          cp data/latest.json data/diff.json site/data/
          cat > site/index.html <<'EOF'
          <!doctype html><meta http-equiv="refresh" content="0; url=dashboard/">
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
